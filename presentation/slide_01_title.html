<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #FDFBF7;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding: 80px;
        color: #2C2A26;
        font-family: 'Inter', sans-serif;
        position: relative;
        overflow: hidden;
      }
      .main-title {
        font-family: 'Playfair Display', serif;
        font-size: 64px;
        font-weight: 700;
        line-height: 1.1;
        color: #8E7F6D;
        margin-bottom: 20px;
        max-width: 800px;
      }
      .subtitle {
        font-family: 'Inter', sans-serif;
        font-size: 32px;
        font-weight: 400;
        line-height: 1.3;
        color: #2C2A26;
        max-width: 700px;
      }
      .divider {
        position: absolute;
        top: 0;
        right: 0;
        width: 1px;
        height: 100%;
        background: linear-gradient(to bottom, #8E7F6D, #C5A059);
        opacity: 0.3;
      }
      .gradient-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 150px;
        background: linear-gradient(to top, rgba(197, 160, 89, 0.1), transparent);
        pointer-events: none;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="main-title">
            Pote Sagrado: Transformando Sonhos em Realidade
        </div>
        <div class="subtitle">
            Uma Plataforma Inovadora para Planejamento Financeiro de Casais
        </div>
        <div class="divider"></div>
        <div class="gradient-overlay"></div>
    </div>
</body>
</html>
