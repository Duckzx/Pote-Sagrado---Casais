<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background: #FDFBF7;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        padding: 80px;
        color: #2C2A26;
        font-family: 'Inter', sans-serif;
        position: relative;
        overflow: hidden;
      }
      .slide-title {
        font-family: 'Playfair Display', serif;
        font-size: 32px;
        font-weight: 700;
        line-height: 1.2;
        color: #8E7F6D;
        margin-bottom: 10px;
        max-width: 900px;
      }
      .slide-subtitle {
        font-family: 'Inter', sans-serif;
        font-size: 20px;
        font-weight: 400;
        line-height: 1.4;
        color: #2C2A26;
        margin-bottom: 20px; /* reduced from 60 -> saves vertical space */
        max-width: 800px;
      }
      .contact-grid {
        display: grid;
        grid-template-columns: 1fr 200px; /* narrow image column to reduce its displayed height */
        gap: 40px;
        width: 100%;
        align-items: start;
      }
      .contact-info {
        display: flex;
        flex-direction: column;
        gap: 12px; /* reduced from 30 */
      }
      .info-item {
        border-top: 1px solid #C5A059;
        padding-top: 8px; /* reduced from 20 */
      }
      .info-label {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #C5A059;
        margin-bottom: 6px; /* reduced from 10 */
      }
      .info-value {
        font-family: 'Playfair Display', serif;
        font-size: 24px;
        font-weight: 700;
        color: #2C2A26;
      }
      .info-value a { color: inherit; text-decoration: none; }
      .cta-text {
        font-family: 'Inter', sans-serif;
        font-size: 16px;
        line-height: 1.6;
        color: #2C2A26;
        margin-top: 12px; /* reduced from 20 */
        font-style: italic;
      }
      .image-container {
        display: flex;
        justify-content: center;
        align-items: center;
        border: 1px solid #8E7F6D;
        background: #fff;
        padding: 8px; /* reduced from 10 */
      }
      .site-preview {
        width: 100%; /* fill the narrow column to constrain displayed width */
        height: auto;
        object-fit: contain;
        display: block;
      }
      .vertical-line {
        position: absolute;
        top: 0;
        right: 40px;
        width: 1px;
        height: 100%;
        background: linear-gradient(to bottom, transparent, #8E7F6D, transparent);
        opacity: 0.2;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <h2 class="slide-title">Contato e Próximos Passos</h2>
        <p class="slide-subtitle">Vamos Construir o Futuro Juntos</p>
        
        <div class="contact-grid">
            <div class="contact-info">
                <div class="info-item">
                    <div class="info-label">Website</div>
                    <div class="info-value"><a href="https://pote-sagrado-casais.vercel.app">pote-sagrado-casais.vercel.app</a></div>
                </div>
                <div class="info-item">
                    <div class="info-label">E-mail</div>
                    <div class="info-value">contato@potesagrado.com</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Investimento</div>
                    <p class="cta-text">Estamos buscando parceiros estratégicos para escalar o Pote Sagrado e impactar milhões de casais globalmente.</p>
                </div>
            </div>
            
            <div class="image-container">
                <img src="/home/ubuntu/upload/Screenshot_20260422_152137_Chrome.png" alt="Site Preview" class="site-preview">
            </div>
        </div>
        
        <div class="vertical-line"></div>
    </div>
</body>
</html>
